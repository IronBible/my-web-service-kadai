<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日のインスピレーション</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            background-color: #333;
            background-size: cover;
            background-position: center;
            transition: background-image 1s ease-in-out; 
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            max-width: 80%;
        }
        #date {
            font-size: 1.5em;
            margin-bottom: 5px;
            color: #ddd;
        }
        /* 天気用のデザインを追加 */
        #weather {
            font-size: 1.2em;
            margin-bottom: 20px;
            color: #87CEEB; /* 少し青みがかった色 */
        }
        #quote {
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        button {
            padding: 12px 24px;
            font-size: 1.1em;
            cursor: pointer;
            border: none;
            border-radius: 30px;
            background-color: rgba(255, 255, 255, 0.9);
            color: #333;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            background-color: white;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="date"></div>
        <div id="weather">天気を読み込み中...</div>
        
        <div id="quote">インスピレーションを読み込み中...</div>
        <button onclick="loadInspiration()">新しいインスピレーション</button>
    </div>

    <script>
        // ① 日付を表示する機能
        function updateDate() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' };
            document.getElementById('date').innerText = now.toLocaleDateString('ja-JP', options);
        }

        // ② 天気を取得する機能 (Open-Meteo APIを使用)
        async function loadWeather() {
            try {
                // 東京の緯度(35.6895)と経度(139.6917)を指定しています
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=35.6895&longitude=139.6917&current_weather=true');
                const data = await res.json();
                const temp = data.current_weather.temperature;
                document.getElementById('weather').innerText = `🌍 東京の現在の気温: ${temp}℃`;
            } catch (error) {
                document.getElementById('weather').innerText = "天気情報が取得できませんでした";
            }
        }

        // ③ 日本語の名言リスト（配列）
        const meigenList = [
            "やったことは、例え失敗しても、20年後には笑い話にできる。しかし、やらなかったことは、20年後、後悔するだけだ。 - マーク・トウェイン",
            "ステップ・バイ・ステップ。どんなことでも、何かを達成する場合にとるべき方法はただひとつ、一歩ずつ着実に立ち向かうことだ。 - マイケル・ジョーダン",
            "失敗したわけではない。それを誤りだと言ってはいけない。勉強したのだと言いたまえ。 - トーマス・エジソン",
            "他人の意見で自分の本当の心の声を消してはならない。 - スティーブ・ジョブズ",
            "変革せよ。変革を迫られる前に。 - ジャック・ウェルチ"
        ];

        // ④ 画像と名言をランダムに表示する機能
        function loadInspiration() {
            // ランダムな画像
            const randomId = Math.floor(Math.random() * 1000);
            document.body.style.backgroundImage = `url('https://picsum.photos/id/${randomId}/1920/1080')`;

            // ランダムな名言をリストから選ぶ
            const randomIndex = Math.floor(Math.random() * meigenList.length);
            document.getElementById('quote').innerText = meigenList[randomIndex];
        }

        // ページを開いたときに実行
        updateDate();
        loadWeather();
        loadInspiration();
    </script>

</body>
</html>
