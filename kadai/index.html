<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日のインスピレーション</title>
    <style>
        /* 見た目を整えるCSS */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            background-color: #333;
            background-size: cover;
            background-position: center;
            /* 背景画像が切り替わるときにフワッとさせる */
            transition: background-image 1s ease-in-out; 
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(0, 0, 0, 0.5); /* 半透明の黒背景 */
            border-radius: 15px;
            max-width: 80%;
        }
        #date {
            font-size: 1.5em;
            margin-bottom: 10px;
            color: #ddd;
        }
        #quote {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 30px;
            line-height: 1.4;
        }
        button {
            padding: 12px 24px;
            font-size: 1.1em;
            cursor: pointer;
            border: none;
            border-radius: 30px;
            background-color: rgba(255, 255, 255, 0.9);
            color: #333;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            background-color: white;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="date"></div>
        
        <div id="quote">インスピレーションを読み込み中...</div>
        
        <button onclick="loadInspiration()">新しいインスピレーション</button>
    </div>

    <script>
        // ① 今日の日付を表示する機能
        function updateDate() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' };
            document.getElementById('date').innerText = now.toLocaleDateString('ja-JP', options);
        }

        // ② 外部APIから「名言（アドバイス）」と「画像」を取得する機能
        async function loadInspiration() {
            // ランダムな美しい風景画像を取得（Picsum API）
            const randomId = Math.floor(Math.random() * 1000);
            document.body.style.backgroundImage = `url('https://picsum.photos/id/${randomId}/1920/1080')`;

            // ランダムなアドバイスを取得（Advice Slip API ※英語）
            try {
                const response = await fetch('https://api.adviceslip.com/advice');
                const data = await response.json();
                // 取得したテキストを画面にセット
                document.getElementById('quote').innerText = `"${data.slip.advice}"`;
            } catch (error) {
                document.getElementById('quote').innerText = "エラーが発生しました。もう一度ボタンを押してください。";
            }
        }

        // ③ ページを開いたときに上記の機能を実行する
        updateDate();
        loadInspiration();
    </script>

</body>
</html>
